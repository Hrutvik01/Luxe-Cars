<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Portal | Luxe Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #e67e22;
            --glass: rgba(10, 10, 10, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --error: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .bg-video {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
            filter: brightness(0.3) saturate(0.8); z-index: -1;
        }

        .main-portal {
            width: 1100px; height: 680px; background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 40px; display: flex;
            box-shadow: 0 50px 100px rgba(0,0,0,1); overflow: hidden;
        }

        /* --- FORM SECTION --- */
        .form-section { flex: 1; padding: 60px; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        .brand-logo { font-family: 'Syncopate', sans-serif; font-size: 1rem; letter-spacing: 6px; margin-bottom: 40px; color: white; }

        .role-selector { width: 180px; height: 44px; background: rgba(255,255,255,0.03); border-radius: 50px; display: flex; align-items: center; padding: 5px; margin-bottom: 30px; position: relative; border: 1px solid var(--border); }
        .role-option { flex: 1; text-align: center; font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.3); cursor: pointer; z-index: 2; transition: 0.4s; }
        .role-option.active { color: white; }
        .role-slider { position: absolute; width: 48%; height: 80%; background: var(--accent); border-radius: 50px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); left: 4px; }

        h2 { font-family: 'Syncopate', sans-serif; font-size: 1.6rem; margin-bottom: 12px; color: white; }
        .subtitle { font-size: 0.75rem; color: #555; margin-bottom: 30px; }

        .input-box { margin-bottom: 20px; position: relative; }
        .input-box label { font-size: 0.5rem; color: #444; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .input-box input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #222; padding: 12px 35px 12px 0; color: white; font-size: 0.95rem; outline: none; transition: 0.3s; }
        .input-box input:focus { border-bottom-color: var(--accent); }

        .toggle-peek {
            position: absolute; right: 0; bottom: 12px; cursor: pointer; opacity: 0.3; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .toggle-peek:hover { opacity: 1; }
        .toggle-peek svg { width: 18px; height: 18px; fill: white; }

        #admin-key-field { max-height: 0; opacity: 0; overflow: hidden; transition: 0.5s ease; }
        #admin-key-field.show { max-height: 100px; opacity: 1; margin-bottom: 20px; }

        .btn-action { width: 100%; background: white; color: black; border: none; padding: 20px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; margin-top: 10px; transition: 0.3s; }
        .btn-action:hover { background: var(--accent); color: white; }
        
        .shake { animation: shakeBtn 0.4s; background: var(--error) !important; color: white; }
        @keyframes shakeBtn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        /* --- VISUAL PANEL (ADMIN GRID) --- */
        .visual-section { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.2); }
        .user-placeholder { text-align: center; transition: 0.5s; }
        .admin-grid { display: none; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 450px; opacity: 0; transition: 0.5s; }
        .admin-grid.visible { display: grid; opacity: 1; }
        .admin-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 30px 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .admin-card.selected { border-color: var(--accent); background: rgba(230,126,34,0.1); }
        .admin-card .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
        .admin-card .label { font-size: 0.55rem; font-family: 'Syncopate'; color: #666; letter-spacing: 2px; }
        .admin-card.selected .label { color: white; }
    </style>
</head>
<body>

    <div class="bg-video"></div>

    <div class="main-portal">
        <div class="form-section">
            <div class="brand-logo">LUXE DRIVE</div>
            <div class="role-selector">
                <div class="role-slider" id="slider"></div>
                <div class="role-option active" id="btn-user" onclick="setRole('user')">USER</div>
                <div class="role-option" id="btn-admin" onclick="setRole('admin')">ADMIN</div>
            </div>

            <h2 id="heading">WELCOME</h2>
            <p class="subtitle" id="sub">Standard Driver Access</p>
            
            <div class="input-box">
                <label>Identifier</label>
                <input type="text" id="user-id" placeholder="Account ID (e.g. MN001, SP001)">
            </div>

            <div class="input-box" id="admin-key-field">
                <label style="color: var(--accent);">Encryption Token</label>
                <input type="password" id="admin-token" placeholder="SEC-ALPHA-XXXX">
                <div class="toggle-peek" onclick="toggleVisibility('admin-token')">
                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
            </div>

            <div class="input-box">
                <label>Passphrase</label>
                <input type="password" id="user-pass" placeholder="••••••••">
                <div class="toggle-peek" onclick="toggleVisibility('user-pass')">
                    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
            </div>

            <button class="btn-action" id="submit-btn" onclick="handleAuth()">Start Engine</button>
        </div>

        <div class="visual-section">
            <div class="user-placeholder" id="user-view">
                <div style="font-size: 5rem; opacity: 0.3; margin-bottom: 20px;">🏎️</div>
                <div style="font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 5px; color: #333;">FLEET IDENTITY</div>
            </div>

            <div class="admin-grid" id="admin-view">
                <div class="admin-card" onclick="selectTier('STAFF', this)"><span class="icon">👔</span><span class="label">Staff</span></div>
                <div class="admin-card" onclick="selectTier('MANAGER', this)"><span class="icon">📊</span><span class="label">Manager</span></div>
                <div class="admin-card" onclick="selectTier('LEADER', this)"><span class="icon">⚡</span><span class="label">Leader</span></div>
                <div class="admin-card" onclick="selectTier('OWNER', this)"><span class="icon">👑</span><span class="label">Owner</span></div>
            </div>
        </div>
    </div>

    <script>
        let role = 'user';
        let tier = null;

        const db = {
            // STAFF (5)
            "SP001": { type: "STAFF", token: "STF01", pass: "luxe77", name: "Shubh Parker" },
            "SP002": { type: "STAFF", token: "STF02", pass: "luxe78", name: "Anish Roy" },
            "SP003": { type: "STAFF", token: "STF03", pass: "luxe79", name: "Kavya Iyer" },
            "SP004": { type: "STAFF", token: "STF04", pass: "luxe80", name: "Zaid Khan" },
            "SP005": { type: "STAFF", token: "STF05", pass: "luxe81", name: "Pooja Das" },
            
            // MANAGERS (5)
            "MN001": { type: "MANAGER", token: "MGR01", pass: "boss01", name: "Aryan Varma" },
            "MN002": { type: "MANAGER", token: "MGR02", pass: "boss02", name: "Sarah Jenkins" },
            "MN003": { type: "MANAGER", token: "MGR03", pass: "boss03", name: "Vikram Malhotra" },
            "MN004": { type: "MANAGER", token: "MGR04", pass: "boss04", name: "Elena Gilbert" },
            "MN005": { type: "MANAGER", token: "MGR05", pass: "boss05", name: "Rajiv Mehta" },

            // LEADERS (3)
            "LD001": { type: "LEADER", token: "LDR01", pass: "lead01", name: "Captain Rogers" },
            "LD002": { type: "LEADER", token: "LDR02", pass: "lead02", name: "Natasha Roman" },
            "LD003": { type: "LEADER", token: "LDR03", pass: "lead03", name: "Bruce Banner" },

            // OWNERS (2)
            "OW001": { type: "OWNER", token: "OWN01", pass: "king01", name: "Tony Stark" },
            "OW002": { type: "OWNER", token: "OWN02", pass: "king02", name: "Elon Musk" }
        };

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            el.type = (el.type === 'password') ? 'text' : 'password';
        }

        function setRole(r) {
            role = r;
            const slider = document.getElementById('slider');
            const adminField = document.getElementById('admin-key-field');
            const userView = document.getElementById('user-view');
            const adminView = document.getElementById('admin-view');
            const btn = document.getElementById('submit-btn');

            if(role === 'admin') {
                slider.style.left = "48%";
                adminField.classList.add('show');
                userView.style.display = 'none';
                adminView.classList.add('visible');
                document.getElementById('heading').innerText = "ADMIN PORTAL";
                btn.innerText = "LOCKED: ENTER TOKEN";
                btn.style.opacity = "0.6";
            } else {
                slider.style.left = "4px";
                adminField.classList.remove('show');
                adminView.classList.remove('visible');
                setTimeout(() => userView.style.display = 'block', 200);
                document.getElementById('heading').innerText = "WELCOME";
                btn.innerText = "Start Engine";
                btn.style.opacity = "1";
            }
        }

        document.getElementById('admin-token').addEventListener('input', function(e) {
            if(role === 'admin') {
                const val = e.target.value.toUpperCase();
                const btn = document.getElementById('submit-btn');
                const validTokens = Object.values(db).map(u => u.token);
                if(validTokens.includes(val)) {
                    btn.style.opacity = "1";
                    btn.style.background = "var(--accent)";
                    btn.innerText = "TOKEN VERIFIED";
                } else {
                    btn.style.opacity = "0.6";
                    btn.innerText = "LOCKED: ENTER TOKEN";
                    btn.style.background = "white";
                }
            }
        });

        function selectTier(t, el) {
            document.querySelectorAll('.admin-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            tier = t;
        }

        function handleAuth() {
            const id = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const token = document.getElementById('admin-token').value.toUpperCase();
            const btn = document.getElementById('submit-btn');

            if (role === 'user') { window.location.href = 'pro_9.html'; return; }

            const user = db[id];
            if(user && user.pass === pass && user.token === token && user.type === tier) {
                localStorage.setItem('loggedUser', JSON.stringify(user));
                btn.innerText = "AUTHENTICATED";
                
                // REDIRECT LOGIC BASED ON TIER
                let target = 'staff_9.html';
                if(tier === 'MANAGER') target = 'manager_portal.html';
                if(tier === 'LEADER') target = 'leader_portal.html';
                if(tier === 'OWNER') target = 'owner_terminal.html';

                setTimeout(() => { window.location.href = target; }, 1000);
            } else {
                triggerError();
            }
        }

        function triggerError() {
            const btn = document.getElementById('submit-btn');
            btn.classList.add('shake');
            btn.innerText = "ACCESS DENIED";
            setTimeout(() => {
                btn.classList.remove('shake');
                btn.innerText = role === 'admin' ? "LOCKED: ENTER TOKEN" : "Start Engine";
            }, 1500);
        }
    </script>
</body>
</html>
