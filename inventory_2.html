<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Luxe Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL INTERFACE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .viewport-frame {
            width: 96vw; height: 92vh; background: #1a1a1a; border-radius: 60px;
            border: 8px solid rgba(255, 255, 255, 0.1); padding: 40px; overflow-y: scroll;
            position: relative;
        }
        ::-webkit-scrollbar { display: none; }

        /* --- NON-FLOATING TOP NAV --- */
        .top-nav {
            position: absolute; 
            top: 40px; left: 40px; right: 40px;
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; margin-bottom: 20px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none;
            font-size: 0.7rem; font-weight: 700; transition: 0.3s;
        }
        .btn-back:hover { background: white; color: black; }

        /* --- SEARCH BAR --- */
        .search-container { flex: 0.6; position: relative; }
        .search-bar {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            padding: 12px 25px; color: white; outline: none;
            transition: 0.3s; font-size: 0.8rem;
        }
        .search-bar:focus { border-color: #e67e22; background: rgba(255,255,255,0.1); }

        .header { text-align: center; margin: 120px 0 60px; color: white; }
        .header h1 { font-weight: 900; letter-spacing: 2px; font-size: 2.5rem; }
        .header p { opacity: 0.5; margin-top: 10px; font-weight: 700; letter-spacing: 1px; }

        /* --- THE GRID --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; padding-bottom: 50px;
        }
        
        .car-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px; padding: 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            color: white; text-align: center; position: relative;
            min-height: 520px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .car-card:hover { border-color: rgba(230, 126, 34, 0.5); background: rgba(255, 255, 255, 0.05); }
        
        .car-img-container { height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .car-card img { width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5)); }

        .car-card h3 { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }
        .car-card span { font-size: 0.65rem; opacity: 0.4; text-transform: uppercase; display: block; margin-bottom: 10px; letter-spacing: 2px; }
        
        .price-tag { color: #e67e22; font-weight: 900; font-size: 1.1rem; margin-bottom: 20px; display: block; }

        .button-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }

        .order-btn {
            background: white; color: black; border: none; padding: 14px 25px;
            border-radius: 25px; font-weight: 900; font-size: 0.75rem; cursor: pointer;
            transition: 0.3s; width: 100%; text-transform: uppercase;
        }
        .order-btn:hover { background: #27ae60; color: white; transform: translateY(-2px); }

        .customize-btn {
            background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 14px 25px; border-radius: 25px; font-weight: 800; font-size: 0.75rem; cursor: pointer;
            transition: 0.3s; width: 100%; text-transform: uppercase;
        }
        .customize-btn:hover { background: #e67e22; border-color: #e67e22; color: white; transform: translateY(-2px); }
        
        .empty-msg { color: white; text-align: center; width: 100%; font-size: 1.2rem; opacity: 0.5; padding: 100px 0; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="viewport-frame">
        <div class="top-nav">
            <a href="pro_11.html" class="btn-back">← BACK TO GALLERY</a>
            <div class="search-container">
                <input type="text" class="search-bar" id="search-input" placeholder="Search brand or model..." onkeyup="filterInventory()">
            </div>
            <div style="width: 140px;"></div> 
        </div>
        
        <div class="header">
            <h1>LUXE INVENTORY</h1>
            <p id="counter">INITIALIZING SYSTEM...</p>
        </div>

        <div class="grid" id="inventory-grid"></div>
    </div>

    <script>
        // --- INTERNAL DATABASE ---
        const carAssets = {
            "MCLAREN": "https://purepng.com/public/uploads/large/purepng.com-orange-mclaren-720s-carcarvehiclemclaren-631522335133y97id.png",
            "LAMBORGHINI": "https://www.pngplay.com/wp-content/uploads/13/Lamborghini-Urus-PNG-Photos.png",
            "FERRARI": "https://www.pngplay.com/wp-content/uploads/13/Ferrari-Roma-PNG-Photos.png",
            "PORSCHE": "https://www.pngplay.com/wp-content/uploads/12/Porsche-911-GT3-RS-White-PNG-Photos.png",
            "SHELBY": "https://www.pngplay.com/wp-content/uploads/13/Ford-Shelby-GT500-PNG-Free-File-Download.png",
            "BUGATTI": "https://www.pngplay.com/wp-content/uploads/13/Bugatti-Chiron-PNG-Images-HD.png",
            "KOENIGSEGG": "https://www.pngplay.com/wp-content/uploads/13/Koenigsegg-Jesko-Transparent-File.png",
            "ASTON MARTIN": "https://www.pngplay.com/wp-content/uploads/13/Aston-Martin-Valkyrie-PNG-HD-Quality.png",
            "PAGANI": "https://www.pngplay.com/wp-content/uploads/13/Pagani-Huayra-Transparent-Free-PNG.png",
            "TESLA": "https://www.pngplay.com/wp-content/uploads/13/Tesla-Cybertruck-Free-PNG.png"
        };

        const brands = Object.keys(carAssets);
        const models = ["750S Performance", "Urus Performante", "Roma Spider", "911 GT3 RS", "GT500 Heritage", "Chiron SuperSport", "Jesko Absolut", "Valkyrie AMR Pro", "Huayra Roadster", "Cybertruck Tri-Motor"];
        
        // Generate fleet with unique values
        let fleet = [];
        brands.forEach((brand, index) => {
            for(let i=1; i<=5; i++) {
                // Variation in price and model name for realism
                const basePrice = (index + 1) * 150000;
                const randomAdd = Math.floor(Math.random() * 50000);
                
                fleet.push({
                    id: `LX-${brand.substring(0,3)}-${Math.floor(Math.random() * 9000 + 1000)}`,
                    brand: brand,
                    name: `${models[index]} Vol.${i}`,
                    priceRaw: basePrice + randomAdd,
                    priceStr: "₹" + (basePrice + randomAdd).toLocaleString('en-IN'),
                    img: carAssets[brand]
                });
            }
        });

        const grid = document.getElementById('inventory-grid');
        const counter = document.getElementById('counter');

        function renderInventory(data = fleet) {
            grid.innerHTML = data.length === 0 ? '<div class="empty-msg">SEARCH PROTOCOL: NO MATCHES FOUND</div>' : '';
            counter.innerText = `${data.length} PRECISION MACHINES ONLINE`;

            data.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `
                    <div>
                        <span>${car.brand}</span>
                        <div class="car-img-container"><img src="${car.img}" alt="${car.name}"></div>
                        <h3>${car.name}</h3>
                        <span class="price-tag">${car.priceStr}</span>
                    </div>
                    <div class="button-group">
                        <button class="customize-btn" onclick="customizeCar('${car.id}')">Bespoke Studio</button>
                        <button class="order-btn" onclick="orderCar('${car.id}')"><a herf= "order_7.html">Order Now</a></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterInventory() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filteredData = fleet.filter(car => 
                car.brand.toLowerCase().includes(query) || 
                car.name.toLowerCase().includes(query)
            );
            renderInventory(filteredData);
        }

        function orderCar(id) {
            const car = fleet.find(c => c.id === id);
            const params = new URLSearchParams({
                name: `${car.brand} ${car.name}`,
                price: car.priceStr,
                img: car.img
            });
            // Redirects to order_7.html with car details in URL
            window.location.href = `order_7.html?${params.toString()}`;
        }

        function customizeCar(id) {
            const car = fleet.find(c => c.id === id);
            const params = new URLSearchParams({
                name: `${car.brand} ${car.name}`,
                img: car.img,
                brand: car.brand
            });
            window.location.href = `customize_2.html?${params.toString()}`;
        }

        // Run initial render
        renderInventory();
    </script>
</body>
</html>
