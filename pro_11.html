<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Drive | Global Fleet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { display: none; }
        body { background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* --- MAIN SLIDER UI --- */
        .vertical-slider {
            width: 96vw; height: 92vh; overflow-y: scroll;
            scroll-snap-type: y mandatory; border-radius: 60px;
            position: relative; background: #111; scrollbar-width: none;
        }

        .brand-container {
            width: 100%; height: 100%; scroll-snap-align: start;
            display: flex; overflow-x: scroll; scroll-snap-type: x mandatory;
        }

        .model-slide {
            min-width: 100%; height: 100%; scroll-snap-align: start;
            position: relative; display: flex; flex-direction: column;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; 
        }

        .side-nav {
            position: fixed; left: 5vw; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 30px; z-index: 1000;
        }
        .side-nav a {
            color: white; text-decoration: none; font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; writing-mode: vertical-lr; transform: rotate(180deg); opacity: 0.3; transition: 0.3s;
        }
        .side-nav a:hover { opacity: 1; color: #e67e22; }

        .bg-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; text-align: center; font-size: clamp(4rem, 16vw, 18vw); 
            font-weight: 900; color: rgba(255, 255, 255, 0.08); text-transform: uppercase; pointer-events: none; z-index: 1;
        }

        .main-display { flex-grow: 1; display: flex; justify-content: center; align-items: center; z-index: 2; }
        .car-img { width: 100%; max-width: 750px; filter: drop-shadow(0 50px 40px rgba(0,0,0,0.5)); transform: scale(0.85); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); object-fit: contain; max-height: 40vh; }
        .model-slide.active .car-img { transform: scale(1.05); }

        /* --- ENGINE SHAKE ANIMATION --- */
        @keyframes engineShake {
            0% { transform: scale(1.05) translate(1px, 1px) rotate(0deg); }
            10% { transform: scale(1.05) translate(-1px, -2px) rotate(-1deg); }
            20% { transform: scale(1.05) translate(-3px, 0px) rotate(1deg); }
            30% { transform: scale(1.05) translate(3px, 2px) rotate(0deg); }
            40% { transform: scale(1.05) translate(1px, -1px) rotate(1deg); }
            50% { transform: scale(1.05) translate(-1px, 2px) rotate(-1deg); }
            60% { transform: scale(1.05) translate(-3px, 1px) rotate(0deg); }
            70% { transform: scale(1.05) translate(3px, 1px) rotate(-1deg); }
            80% { transform: scale(1.05) translate(-1px, -1px) rotate(1deg); }
            90% { transform: scale(1.05) translate(1px, 2px) rotate(0deg); }
            100% { transform: scale(1.05) translate(1px, -2px) rotate(-1deg); }
        }
        .car-img.shaking {
            animation: engineShake 0.4s infinite;
            filter: drop-shadow(0 55px 45px rgba(230,126,34,0.3));
        }

        /* --- FOOTER SPEC CARD --- */
        .glass-footer {
            margin: 0 60px 50px 140px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px); border-radius: 40px; padding: 20px 40px;
            display: flex; align-items: center; gap: 20px; color: white; border: 1px solid rgba(255, 255, 255, 0.15); z-index: 10;
            position: relative; justify-content: space-between;
        }

        .car-identity { min-width: 140px; }
        .car-identity h2 { font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; }

        .spec-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            gap: 20px; flex: 1;
        }
        
        .specs-data { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; flex: 1; }
        .specs-data div span { display: block; font-weight: 900; font-size: 0.85rem; color: #fff; }
        .specs-data div label { font-size: 0.5rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

        /* --- TALL GLASS START BUTTON --- */
        .btn-start-engine {
            height: 100px; width: 80px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; gap: 10px; user-select: none;
        }
        .btn-start-engine:hover { background: rgba(230, 126, 34, 0.2); border-color: #e67e22; transform: translateY(-3px); }
        .btn-start-engine:active { transform: translateY(2px) scale(0.95); background: rgba(230, 126, 34, 0.5); box-shadow: inset 0 5px 15px rgba(0,0,0,0.5); }
        .btn-start-engine img { width: 35px; filter: invert(1); transition: 0.3s; }
        .btn-start-engine:active img { filter: invert(1) drop-shadow(0 0 5px #fff); }
        .btn-start-engine span { font-size: 0.5rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: #fff; }

        .btn-action {
            background: #fff; color: #000; padding: 10px 20px; border-radius: 30px;
            border: none; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-action:hover { background: #e67e22; color: #fff; transform: translateY(-2px); }

        .btn-details {
            background: #e67e22; color: #fff; padding: 10px 18px; border-radius: 20px;
            border: none; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            white-space: nowrap;
        }
        .btn-details:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,126,34,0.4); }

        /* --- POPUP MODAL --- */
        .custom-popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 20000; backdrop-filter: blur(10px);
        }
        
        .popup-card {
            background: #0f0f0f; width: 90vw; max-width: 1000px; height: 85vh; max-height: 720px;
            border-radius: 25px; display: flex; color: white; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        
        .popup-card.compare-mode { max-width: 1200px; }

        .popup-left {
            flex: 1; background: #181818; display: flex; align-items: center; justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.05); padding: 40px; position: relative;
        }
        .popup-left img { width: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); transform: scale(1.1); max-height: 350px; object-fit: contain; }
        
        .popup-right {
            flex: 1.2; display: flex; flex-direction: column; padding: 40px; background: #0f0f0f; width: 100%;
        }

        .popup-header { margin-bottom: 20px; }
        .popup-header h1 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 2rem; margin-bottom: 2px; text-transform: uppercase; color: #fff; letter-spacing: -1px; }
        .popup-header p { font-size: 0.7rem; color: #888; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }

        .build-summary-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-transform: uppercase; }

        .specs-scroll-area { flex: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 20px; }
        .specs-scroll-area::-webkit-scrollbar { display: block; width: 6px; }
        .specs-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .spec-section { margin-bottom: 25px; }
        .spec-section h3 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        
        .spec-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; }
        .spec-row span:first-child { color: #aaa; }
        .spec-row span:last-child { font-weight: 700; text-align: right; color: #fff; }

        .popup-footer { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .price-row span:first-child { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .price-row span:last-child { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -1px; }

        .popup-buttons { display: flex; gap: 15px; }
        .btn-pop {
            flex: 1; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s; text-align: center; border: none; letter-spacing: 1px;
        }
        .btn-pop-back { background: #1a1a1a; border: 1px solid #333; color: white; }
        .btn-pop-back:hover { background: #222; }
        .btn-pop-order { background: white; color: black; }
        .btn-pop-order:hover { background: #e0e0e0; }

        .brand-dots { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.4s; cursor: pointer; }
        .dot.active { background: white; transform: scale(2.5); box-shadow: 0 0 15px white; }
        .config-dots { display: flex; gap: 8px; margin-top: 5px; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; cursor: pointer; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.3); }

        /* --- COMPARE GRID --- */
        .compare-mode .popup-left { display: none; }
        .compare-grid { display: none; width: 100%; grid-template-columns: 1fr 1fr; gap: 30px; }
        .compare-mode .compare-grid { display: grid; }
        .compare-mode .specs-scroll-area > div:not(.compare-grid) { display: none; }
        
        .compare-glass-card { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; display: flex; flex-direction: column; transition: 0.3s; }
        .compare-glass-card.selected { border-color: #e67e22; box-shadow: 0 0 30px rgba(230, 126, 34, 0.15); }
        .compare-glass-card img { width: 100%; max-height: 140px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .comp-price { text-align: center; color: #e67e22; font-weight: 700; margin-bottom: 20px; }

        .custom-check-container { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; justify-content: center; transition: 0.3s; }
        .custom-check-container.checked { background: rgba(230, 126, 34, 0.15); border-color: #e67e22; }
        .check-box { width: 20px; height: 20px; border: 2px solid #555; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .custom-check-container.checked .check-box { background: #e67e22; border-color: #e67e22; }
        .custom-check-container.checked .check-box::after { content: '✔'; color: white; font-size: 12px; font-weight: 900; }
        
        .btn-comp-customize { width: 100%; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 0.7rem; background: transparent; color: white; border: 1px solid #444; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-comp-customize:hover { border-color: #e67e22; color: #e67e22; }

        .close-popup { position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 1.5rem; opacity: 0.5; transition: 0.3s; z-index: 100; }
        .close-popup:hover { opacity: 1; transform: rotate(90deg); }
    </style>
</head>

        let stashedCar = null;

        // Dynamic HTML Generation for the 50 Car slider
        carData.forEach((brand, bIdx) => {
            const dot = document.createElement('div');

            dotsBox.appendChild(dot);

            const brandGroup = document.createElement('div');
            brandGroup.className = 'brand-container';
            
            brand.models.forEach((m, mIdx) => {
                const slide = document.createElement('div');
                slide.className = 'model-slide';
                slide.style.background = brand.color;
                
                slide.innerHTML = `
                    <div class="top-info" style="display:flex; justify-content:space-between; padding:40px 80px; color:white; z-index:10; position:relative;">

                        <div class="car-identity">
                            <h2>${m.name}</h2>

                            <div class="btn-start-engine" 
                                 onmousedown="startEngine(this, '${m.sound}')" 
                                 onmouseup="stopEngine(this)" 
                                 onmouseleave="stopEngine(this)"
                                 ontouchstart="startEngine(this, '${m.sound}')" 
                                 ontouchend="stopEngine(this)">

        function changeBg(color, el) { el.closest('.model-slide').style.background = color; }
        
        // Advanced Audio Engine Controller
        function startEngine(btn, soundUrl) {
            const img = btn.closest('.model-slide').querySelector('.car-img');
            img.classList.add('shaking');
            
            // Standard fallback sound if the specific local file isn't found
            const fallbackSound = "https://assets.mixkit.co/active_storage/sfx/2650/2650-preview.mp3";
            
            if (engineAudio.src !== soundUrl) {
                engineAudio.src = soundUrl;
            }
            engineAudio.currentTime = 0;
            
            let playPromise = engineAudio.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Original audio file not found. Playing generic fallback.");
                    engineAudio.src = fallbackSound;
                    engineAudio.play();
                    showToast(`Missing original file: ${soundUrl}. Playing fallback.`);
                });
            }
        }

        function stopEngine(btn) {
            const img = btn.closest('.model-slide').querySelector('.car-img');
            img.classList.remove('shaking');
            engineAudio.pause();
        }

        function createSpecRow(label, val) { return `<div class="spec-row"><span>${label}</span><span>${val}</span></div>`; }

        function triggerCompare(bIdx, mIdx) {
            const m = carData[bIdx].models[mIdx];
            if (!stashedCar) {
                stashedCar = m;
                showToast(`Ready to compare ${m.name}. Select another car to compare.`);
            } else if (stashedCar.name !== m.name) {
                openComparePopup(stashedCar, m);
            } else {
                showToast(`${m.name} is already selected for comparison.`);
            }
        }

        function openPopup(bIdx, mIdx) {
            const m = carData[bIdx].models[mIdx];
            const modal = document.getElementById('details-popup');
            const card = document.getElementById('pop-card');
            selectedOrderCar = m; 
            document.getElementById('pop-price').innerText = m.price;
            card.classList.remove('compare-mode');
            document.getElementById('pop-img').src = m.img;
            document.getElementById('pop-name').innerText = m.name;
            const s = m.specs;
            document.getElementById('pop-specs').innerHTML = `
                <div class="spec-section"><h3>⚙️ Engine Specifications</h3>${createSpecRow("Engine Type", s.engine.type)}${createSpecRow("Capacity", s.engine.cap)}${createSpecRow("Max Power", s.engine.power)}${createSpecRow("Max Torque", s.engine.torque)}</div>
                <div class="spec-section"><h3>🔄 Drivetrain</h3>${createSpecRow("Transmission", s.trans.type)}${createSpecRow("Drive Type", s.trans.drive)}</div>
                <div class="spec-section"><h3>⛽ Mileage & Fuel</h3>${createSpecRow("Mileage", s.fuel.mileage)}${createSpecRow("Fuel Tank", s.fuel.tank)}</div>
            `;
            modal.style.display = 'flex';
        }

        function openComparePopup(c1, c2) {
            const modal = document.getElementById('details-popup');
            const card = document.getElementById('pop-card');
            card.classList.add('compare-mode');
            document.getElementById('pop-name').innerText = "COMPARISON MODE";
            window.compareCar1 = c1; window.compareCar2 = c2;
            renderCompare(c1, c2);
            toggleCheckbox(1);
            modal.style.display = 'flex';
            stashedCar = null;
        }

        function renderCompare(c1, c2) {
            const createCol = (car, num) => {
                const s = car.specs;
                return `
                <div class="compare-glass-card" id="comp-card-${num}">
                    <h2>${car.name}</h2><p class="comp-price">${car.price}</p><img src="${car.img}">
                    <div class="spec-section"><h3>⚙️ Performance</h3>${createSpecRow("Type", s.engine.type)}${createSpecRow("HP", car.specs.hp)}${createSpecRow("Top Speed", car.specs.top)}</div>
                    <div class="spec-section"><h3>🔄 Transmission</h3>${createSpecRow("Trans", s.trans.type)}${createSpecRow("Drive", s.trans.drive)}</div>
                    <div class="order-checkbox-wrapper">
                        <div class="custom-check-container" id="check-box-${num}" onclick="toggleCheckbox(${num})"><div class="check-box"></div><span class="check-label">Select For Order</span></div>
                        <button class="btn-comp-customize" onclick="window.location.href='customize_2.html?name=${encodeURIComponent(car.name)}&img=${encodeURIComponent(car.img)}'">Customize</button>
                    </div>
                </div>`;
            };
            document.getElementById('compare-grid').innerHTML = createCol(c1, 1) + createCol(c2, 2);
        }

        function toggleCheckbox(num) {
            selectedOrderCar = num === 1 ? window.compareCar1 : window.compareCar2;
            document.getElementById('pop-price').innerText = selectedOrderCar.price;
            for(let i=1; i<=2; i++) {
                document.getElementById(`comp-card-${i}`).classList.toggle('selected', i === num);
                document.getElementById(`check-box-${i}`).classList.toggle('checked', i === num);
            }
        }

        function placeOrder() { if(selectedOrderCar) window.location.href = `order_7.html?name=${encodeURIComponent(selectedOrderCar.name)}`; }
        
        function showToast(msg) { 
            const t = document.createElement('div'); 
            t.style = "position:fixed; top:40px; right: 40px; background:#e67e22; color:white; padding:15px 30px; border-radius:30px; font-weight:900; font-size:0.7rem; z-index:30000; box-shadow:0 10px 30px rgba(0,0,0,0.5);"; 
            t.innerText = "PROTOCOL: " + msg.toUpperCase(); 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 3000); 
        }

        function closePopup() { document.getElementById('details-popup').style.display = 'none'; }

        // Slide Intersect Observer for dots and sound
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.querySelectorAll('.model-slide').forEach(s => s.classList.remove('active'));
                    entry.target.classList.add('active');
                    const newIdx = Array.from(container.children).indexOf(entry.target.parentElement);
                    if (newIdx !== currentBrandIndex) { currentBrandIndex = newIdx; document.getElementById('click-sound').play(); }
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentBrandIndex));
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.model-slide').forEach(s => observer.observe(s));
    </script>
</body>
